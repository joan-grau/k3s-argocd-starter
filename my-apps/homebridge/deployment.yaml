apiVersion: apps/v1
kind: Deployment
metadata:
  name: homebridge
  namespace: homebridge
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homebridge
  template:
    metadata:
      labels:
        app: homebridge
    spec:
      containers:
      - name: homebridge
        image: homebridge/homebridge:2024-10-25
        ports:
        - containerPort: 8581
          name: http
        env:
        - name: TZ
          value: "Europe/Madrid"
        - name: HOMEBRIDGE_CONFIG_UI_PORT
          value: "8581"
        volumeMounts:
        - name: homebridge-data
          mountPath: /homebridge
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8581
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8581
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: homebridge-data
        persistentVolumeClaim:
          claimName: homebridge-config
