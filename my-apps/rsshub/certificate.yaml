apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rsshub-tls
  namespace: rsshub
spec:
  secretName: rsshub-tls
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: RSA
    size: 2048
  dnsNames:
    - rsshub.local
  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer
