apiVersion: apps/v1
kind: Deployment
metadata:
  name: rsshub
  namespace: rsshub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rsshub
  template:
    metadata:
      labels:
        app: rsshub
    spec:
      containers:
      - name: rsshub
        image: diygod/rsshub:latest
        ports:
        - containerPort: 1200
          name: http
        env:
        - name: CACHE_TYPE
          value: "redis"
        - name: REDIS_URL
          value: "redis://redis:6379/"
        - name: PORT
          value: "1200"
        - name: PUPPETEER_WS_ENDPOINT
          value: "ws://browserless:3000"
        - name: USER_AGENT
          value: "Mozilla/5.0 (Macintosh; Intel Mac OS X 14_0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0 Safari/537.36"
        - name: ACCEPT_LANGUAGE
          value: "en-US,en;q=0.9"
        - name: IG_COOKIE
          valueFrom:
            secretKeyRef:
              name: rsshub-secrets
              key: IG_COOKIE
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 1200
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 1200
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rsshub
  namespace: rsshub
spec:
  selector:
    app: rsshub
  ports:
  - port: 80
    targetPort: 1200
