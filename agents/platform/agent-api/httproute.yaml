apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agent-api
  namespace: agent-api
spec:
  parentRefs:
  - name: gateway-internal
    namespace: gateway
  hostnames:
  - agent-api.lan
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: agent-api
      port: 8000
