apiVersion: v1
kind: ConfigMap
metadata:
  name: agents-config
  namespace: agent-api
data:
  models.yaml: |
    tiers:
      fast:
        provider: openai
        model: gpt-4o-mini
        max_tokens: 1024
        temperature: 0.3
      standard:
        provider: openai
        model: gpt-4o
        max_tokens: 4096
        temperature: 0.5
      ds-fast:
        provider: deepseek
        model: deepseek-chat
        max_tokens: 4096
        temperature: 0.3
      ds-reasoning:
        provider: deepseek
        model: deepseek-reasoner
        max_tokens: 8192
        temperature: 0.6
      expert:
        provider: anthropic
        model: claude-opus-4-7
        max_tokens: 8192

  agents.yaml: |
    agents:
      hello-world:
        name: Hello World Echo
        description: Minimal echo agent for platform testing
        graph: hello_world
        default_tier: fast
      assistant:
        name: Personal Assistant
        description: Conversational assistant with memory and multi-tier routing
        graph: personal_assistant
        default_tier: fast
        memory: true

  memory-lifecycle.yaml: |
    # Memory lifecycle thresholds — read by n8n workflows at runtime.
    # Change values here and sync ArgoCD; n8n picks up on the next run.
    lifecycle:
      compaction:
        # Run daily. Merge duplicate / overlapping memories via GPT-4o-mini.
        schedule: "0 3 * * *"          # 03:00 UTC daily
        min_memories_to_compact: 5     # skip if fewer memories than this
      expiry:
        # Run monthly. Delete memories not updated in stale_days.
        schedule: "0 4 1 * *"          # 04:00 UTC on the 1st of each month
        stale_days: 90
      agents:
        # List of agent_ids to run lifecycle jobs for.
        - assistant
