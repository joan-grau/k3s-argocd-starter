apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-api
  namespace: agent-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-api
  template:
    metadata:
      labels:
        app: agent-api
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
      - name: agent-api
        image: ghcr.io/joan-grau/agent-api:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: agent-api-secrets
              key: db-password
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: agent-api-secrets
              key: redis-password
        - name: DATABASE_URL
          value: postgresql://agents:$(DB_PASSWORD)@postgresql.postgresql.svc.cluster.local:5432/agents
        - name: REDIS_URL
          value: redis://:$(REDIS_PASSWORD)@redis.redis.svc.cluster.local:6379/0
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: agent-api-secrets
              key: openai-api-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: agent-api-secrets
              key: anthropic-api-key
        volumeMounts:
        - name: agents-config
          mountPath: /app/config
          readOnly: true
        - name: tmp
          mountPath: /tmp
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: agents-config
        configMap:
          name: agents-config
      - name: tmp
        emptyDir: {}
