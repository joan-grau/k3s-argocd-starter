apiVersion: batch/v1
kind: Job
metadata:
  name: enable-pgvector
  namespace: postgresql
  annotations:
    # Run once to enable pgvector on existing database.
    # Delete this job after it completes successfully.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        runAsNonRoot: true
      containers:
      - name: enable-pgvector
        image: pgvector/pgvector:pg16
        command:
        - psql
        - --host=postgresql.postgresql.svc.cluster.local
        - --username=agents
        - --dbname=agents
        - --command=CREATE EXTENSION IF NOT EXISTS vector;
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: password
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
