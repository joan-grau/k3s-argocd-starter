apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: agents
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  generators:
  - git:
      repoURL: https://github.com/joan-grau/k3s-argocd-starter.git
      revision: HEAD
      directories:
      - path: agents/platform/*
      - path: agents/domain/*
      - exclude: true
        path: agents/agents-appset.yaml
  template:
    metadata:
      name: 'agent-{{path.basename}}'
      labels:
        type: agent
    spec:
      project: agents
      source:
        plugin:
          name: kustomize-build-with-helm
        repoURL: https://github.com/joan-grau/k3s-argocd-starter.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
        - ApplyOutOfSyncOnly=true
        - Replace=false
        - IgnoreMissingTemplate=true
